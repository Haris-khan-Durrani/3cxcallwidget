version: '3.8'

services:
  app:
    build: .
    container_name: 3cxwidget-app
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=3cx_user
      - DB_PASSWORD=3cx_secret
      - DB_NAME=3cxwidget
      - JWT_SECRET=change_this_secret_in_production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=password123
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1

  db:
    image: mysql:8.0
    container_name: 3cxwidget-db
    environment:
      - MYSQL_DATABASE=3cxwidget
      - MYSQL_USER=3cx_user
      - MYSQL_PASSWORD=3cx_secret
      - MYSQL_ROOT_PASSWORD=root_secret
    volumes:
      - 3cxwidget_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: 3cxwidget-phpmyadmin
    environment:
      - PMA_HOST=db
      - PMA_USER=3cx_user
      - PMA_PASSWORD=3cx_secret
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: 3cxwidget-redis
    restart: unless-stopped

  ai-runner:
    build: ./ai-runner
    container_name: 3cxwidget-ai-runner
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_BACKEND_URL=http://app:3005
    depends_on:
      - redis
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1

volumes:
  3cxwidget_mysql_data:
